# /etc/nginx/sites-available/ojialanshori.conf
# Symlink: ln -s /etc/nginx/sites-available/ojialanshori.conf /etc/nginx/sites-enabled/

upstream ojialanshori_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

# HTTP -> HTTPS redirect (aktifkan setelah certbot dipasang)
server {
    listen 80;
    listen [::]:80;
    server_name ojialanshori.com www.ojialanshori.com;

    # Untuk certbot HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Sebelum SSL aktif, comment baris di bawah dan uncomment block proxy di server ini.
    # Sesudah SSL aktif, biarkan redirect ke https.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ojialanshori.com www.ojialanshori.com;

    # SSL — generated by certbot
    ssl_certificate /etc/letsencrypt/live/ojialanshori.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ojialanshori.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss application/rss+xml font/ttf application/x-font-ttf application/vnd.ms-fontobject image/svg+xml;

    # Upload size (untuk /api/.../upload endpoints)
    client_max_body_size 10M;

    # Static assets dari .output/public — Nginx serve langsung, lewati Node
    # NB: pastikan symlink /var/www/ojialanshori/current ada
    root /var/www/ojialanshori/current/.output/public;

    # _nuxt assets — long cache, immutable
    location /_nuxt/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Fonts
    location /_fonts/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Static files (logo, favicon, public/images yang built-in)
    location ~* \.(ico|png|jpg|jpeg|webp|svg|woff2|woff|ttf)$ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri @app;
    }

    # /images/* — dinamis dari R2 via server route, jangan di-serve static
    location /images/ {
        proxy_pass http://ojialanshori_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering on;
        proxy_cache_valid 200 30m;
    }

    # SSR — semua path lain ke Node
    location / {
        try_files $uri @app;
    }

    location @app {
        proxy_pass http://ojialanshori_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
